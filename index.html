<!DOCTYPE html>
<html>


<head>

    <title>Выбор периода</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }</style>

</head>

<body>

    <h3>Выберите период отчета</h3>

    <input type="text" id="datePicker" placeholder="Нажмите для выбора дат" style="padding: 10px; width: 80%;">

    <br>

    <button onclick="sendData()" style="padding: 10px 20px;">Отправить отчет</button>



    <script>

        flatpickr("#datePicker", { mode: "range", dateFormat: "Y-m-d" });



        function sendData() {

            const range = document.querySelector("#datePicker").value.split(" to ");

            if (range.length < 2) return alert("Выберите даты!");

            

            const data = { period: "custom", date_from: range[0], date_to: range[1] };

            // Отправляем данные в n8n через Telegram WebApp

            window.Telegram.WebApp.sendData(JSON.stringify(data));

            window.Telegram.WebApp.close();

        }

    </script>

</body>

</html>
</body>
</html>
