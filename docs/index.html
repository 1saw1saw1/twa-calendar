<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Выбор периода</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ru.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        h3 {
            margin: 0 0 20px;
            text-align: center;
        }

        #datePicker {
            padding: 12px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000000);
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            width: 100%;
            max-width: 320px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
    </style>
</head>
<body>
    <h3>Выберите период отчета</h3>
    <input type="text" id="datePicker" placeholder="Нажмите для выбора дат" readonly>
    <button type="button" id="sendBtn">Отправить отчет</button>

    <script>
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
        }

        flatpickr("#datePicker", {
            mode: "range",
            dateFormat: "Y-m-d",
            locale: "ru"
        });

        document.getElementById("sendBtn").addEventListener("click", sendData);

        function sendData() {
            const range = document.querySelector("#datePicker").value.split(" to ");
            if (range.length < 2 || !range[0] || !range[1]) {
                const message = "Выберите две даты — начало и конец периода.";
                if (tg?.showAlert) {
                    tg.showAlert(message);
                } else {
                    alert(message);
                }
                return;
            }

            const data = {
                period: "custom",
                date_from: range[0],
                date_to: range[1]
            };

            const payload = JSON.stringify(data);

            if (tg?.sendData) {
                tg.sendData(payload);
                tg.close();
                return;
            }

            alert("Данные для бота:\n" + payload);
        }
    </script>
</body>
</html>
